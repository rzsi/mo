<!DOCTYPE html>

<html lang="en" dir="ltr">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Social</title>

  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: Arial, sans-serif; background: #f0f2f5; }

    .navbar { background: #1877f2; color: white; padding: 15px 20px; font-size: 22px; font-weight: bold; text-align: center; }

    .container { max-width: 600px; margin: 20px auto; padding: 0 10px; }

    .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }

    button { background: #1877f2; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; width: 100%; margin-top: 5px; }

    button:hover { background: #166fe5; }

    .green-btn { background: #42b72a; margin-top: 8px; }

    .green-btn:hover { background: #36a420; }

    .gray-btn { background: #e4e6ea; color: #333; margin-top: 8px; }

    .gray-btn:hover { background: #d0d2d5; }

    .logout { background: #e74c3c; margin-top: 10px; }

    .tabs { display: flex; gap: 10px; margin-bottom: 10px; }

    .tab { flex: 1; background: #e4e6ea; color: #333; border-radius: 8px; }

    .tab.active { background: #1877f2; color: white; }

    .avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; flex-shrink: 0; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

    .frame-option { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 3px solid transparent; }

    .frame-option.selected { border-color: #1877f2; }

    .avatar-frames { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }

    .color-options { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }

    .color-opt { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }

    .color-opt.selected { border-color: #333; transform: scale(1.2); }

    .post { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

    .chat-box { height: 350px; overflow-y: auto; padding: 10px; background: #f9f9f9; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }

    .chat-msg { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; }

    .chat-msg.me { flex-direction: row-reverse; }

    .msg-bubble { background: #e4e6ea; padding: 8px 12px; border-radius: 15px; max-width: 70%; }

    .chat-msg.me .msg-bubble { background: #1877f2; color: white; }

    .msg-name { font-size: 11px; color: #888; margin-bottom: 2px; }

    .chat-input-row { display: flex; gap: 8px; }

    .chat-input-row input { margin: 0; }

    .chat-input-row button { width: auto; padding: 10px 15px; }

    .divider { text-align: center; color: #999; margin: 10px 0; font-size: 13px; }

    #register-section, #setup-section, #app-section { display: none; }

  </style>

</head>

<body>

<div class="navbar">🌐 My Social</div>

<div class="container">

  <!-- Sign In -->

  <div id="login-section">

    <div class="card">

      <h2 style="margin-bottom:15px;text-align:center">Sign In 👋</h2>

      <input id="login-email" type="email" placeholder="Email">

      <input id="login-password" type="password" placeholder="Password">

      <button onclick="login()">Sign In</button>

      <div class="divider">— or —</div>

      <button class="green-btn" onclick="show('register-section')">Create New Account</button>

      <p id="login-error" style="color:red;margin-top:8px;text-align:center"></p>

    </div>

  </div>

  <!-- Register -->

  <div id="register-section">

    <div class="card">

      <h2 style="margin-bottom:15px;text-align:center">Create Account 🎉</h2>

      <input id="reg-name" type="text" placeholder="Display Name">

      <input id="reg-handle" type="text" placeholder="@username (min 2 characters)">

      <input id="reg-email" type="email" placeholder="Email">

      <input id="reg-password" type="password" placeholder="Password (6+ characters)">

      <button onclick="register()" class="green-btn">Create Account</button>

      <button class="gray-btn" onclick="show('login-section')">← Back to Sign In</button>

      <p id="reg-error" style="color:red;margin-top:8px;text-align:center"></p>

    </div>

  </div>

  <!-- Setup Avatar -->

  <div id="setup-section">

    <div class="card">

      <h2 style="margin-bottom:15px;text-align:center">🎨 Choose Your Avatar</h2>

      <p style="margin:10px 0 5px;font-weight:bold">Avatar Emoji:</p>

      <div class="avatar-frames" id="emoji-options"></div>

      <p style="margin:10px 0 5px;font-weight:bold">Avatar Color:</p>

      <div class="color-options" id="color-options"></div>

      <div style="text-align:center;margin:15px 0">

        <p style="margin-bottom:8px;color:#666">Preview:</p>

        <div id="preview-avatar" class="avatar" style="margin:auto;width:70px;height:70px;font-size:35px;border-width:4px"></div>

      </div>

      <button onclick="saveProfile()">Let's Go! 🚀</button>

    </div>

  </div>

  <!-- App -->

  <div id="app-section">

    <div class="card">

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">

        <div id="my-avatar" class="avatar"></div>

        <div>

          <div id="my-username" style="font-weight:bold;font-size:16px"></div>

          <div id="my-handle" style="font-size:13px;color:#888"></div>

        </div>

      </div>

      <div class="tabs">

        <button class="tab active" onclick="showTab('chat', this)">💬 Chat</button>

        <button class="tab" onclick="showTab('posts', this)">📝 Posts</button>

      </div>

    </div>

    <div id="chat-tab">

      <div class="card">

        <div class="chat-box" id="chat-box"></div>

        <div class="chat-input-row">

          <input id="chat-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()">

          <button onclick="sendMessage()">🚀</button>

        </div>

      </div>

    </div>

    <div id="posts-tab" style="display:none">

      <div class="card">

        <textarea id="post-text" placeholder="What's on your mind?" rows="3"></textarea>

        <button onclick="addPost()">Post ✉️</button>

      </div>

      <div id="posts-list"></div>

    </div>

    <button class="logout" onclick="logout()">Sign Out 🚪</button>

  </div>

</div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {

    apiKey: "AIzaSyCZMaW1zJ7OgL6MTa8atPmioUc0CpTrHac",

    authDomain: "my-social-1593e.firebaseapp.com",

    projectId: "my-social-1593e",

    storageBucket: "my-social-1593e.firebasestorage.app",

    messagingSenderId: "879571383969",

    appId: "1:879571383969:web:4a2ca80067ddc2f63622e0"

  };

  const app = initializeApp(firebaseConfig);

  const auth = getAuth(app);

  const db = getFirestore(app);

  let currentUser = null;

  let userProfile = null;

  let selectedEmoji = '😀';

  let selectedColor = '#1877f2';

  let tempProfile = null;

  const emojis = ['😀','😎','🦁','🐯','🦊','🐼','🐸','🤖','👾','🦄','🔥','⭐'];

  const colors = ['#1877f2','#e74c3c','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];

  const emojiContainer = document.getElementById('emoji-options');

  emojis.forEach(e => {

    const div = document.createElement('div');

    div.className = 'frame-option' + (e === selectedEmoji ? ' selected' : '');

    div.textContent = e;

    div.onclick = () => {

      document.querySelectorAll('.frame-option').forEach(x => x.classList.remove('selected'));

      div.classList.add('selected');

      selectedEmoji = e;

      updatePreview();

    };

    emojiContainer.appendChild(div);

  });

  const colorContainer = document.getElementById('color-options');

  colors.forEach(c => {

    const div = document.createElement('div');

    div.className = 'color-opt' + (c === selectedColor ? ' selected' : '');

    div.style.background = c;

    div.onclick = () => {

      document.querySelectorAll('.color-opt').forEach(x => x.classList.remove('selected'));

      div.classList.add('selected');

      selectedColor = c;

      updatePreview();

    };

    colorContainer.appendChild(div);

  });

  function updatePreview() {

    const p = document.getElementById('preview-avatar');

    p.textContent = selectedEmoji;

    p.style.background = selectedColor;

    p.style.borderColor = selectedColor;

  }

  updatePreview();

  window.show = (id) => {

    ['login-section','register-section','setup-section','app-section'].forEach(s => {

      document.getElementById(s).style.display = s === id ? 'block' : 'none';

    });

  };

  onAuthStateChanged(auth, async (user) => {

    if (user) {

      currentUser = user;

      const profileDoc = await getDoc(doc(db, 'users', user.uid));

      if (profileDoc.exists()) {

        userProfile = profileDoc.data();

        showApp();

      } else {

        show('setup-section');

      }

    } else {

      show('login-section');

    }

  });

  function showApp() {

    show('app-section');

    const av = document.getElementById('my-avatar');

    av.textContent = userProfile.emoji;

    av.style.background = userProfile.color;

    av.style.borderColor = userProfile.color;

    document.getElementById('my-username').textContent = userProfile.username;

    document.getElementById('my-handle').textContent = '@' + userProfile.handle;

    loadChat();

    loadPosts();

  }

  window.register = async () => {

    const name = document.getElementById('reg-name').value.trim();

    const handle = document.getElementById('reg-handle').value.trim().replace('@','');

    const email = document.getElementById('reg-email').value.trim();

    const password = document.getElementById('reg-password').value;

    if (!name) { document.getElementById('reg-error').textContent = 'Enter your name!'; return; }

    if (handle.length < 2) { document.getElementById('reg-error').textContent = 'Username must be 2+ characters!'; return; }

    if (!email) { document.getElementById('reg-error').textContent = 'Enter your email!'; return; }

    try {

      tempProfile = { username: name, handle };

      await createUserWithEmailAndPassword(auth, email, password);

    } catch (e) {

      document.getElementById('reg-error').textContent = 'Error: ' + e.message;

    }

  };

  window.login = async () => {

    const email = document.getElementById('login-email').value;

    const password = document.getElementById('login-password').value;

    try {

      await signInWithEmailAndPassword(auth, email, password);

    } catch (e) {

      document.getElementById('login-error').textContent = 'Wrong email or password!';

    }

  };

  window.saveProfile = async () => {

    const profile = {

      username: tempProfile ? tempProfile.username : 'User',

      handle: tempProfile ? tempProfile.handle : 'user',

      emoji: selectedEmoji,

      color: selectedColor

    };

    await setDoc(doc(db, 'users', currentUser.uid), profile);

    userProfile = profile;

    showApp();

  };

  window.logout = () => signOut(auth);

  window.sendMessage = async () => {

    const text = document.getElementById('chat-input').value.trim();

    if (!text) return;

    await addDoc(collection(db, 'chat'), {

      text, uid: currentUser.uid,

      username: userProfile.username,

      handle: userProfile.handle,

      emoji: userProfile.emoji,

      color: userProfile.color,

      time: serverTimestamp()

    });

    document.getElementById('chat-input').value = '';

  };

  function loadChat() {

    const q = query(collection(db, 'chat'), orderBy('time', 'asc'));

    onSnapshot(q, snap => {

      const box = document.getElementById('chat-box');

      box.innerHTML = '';

      snap.forEach(d => {

        const data = d.data();

        const isMe = data.uid === currentUser.uid;

        box.innerHTML += `

          <div class="chat-msg ${isMe ? 'me' : ''}">

            <div class="avatar" style="background:${data.color};border-color:${data.color};width:35px;height:35px;font-size:18px">${data.emoji}</div>

            <div>

              <div class="msg-name">@${data.handle}</div>

              <div class="msg-bubble">${data.text}</div>

            </div>

          </div>`;

      });

      box.scrollTop = box.scrollHeight;

    });

  }

  window.addPost = async () => {

    const text = document.getElementById('post-text').value.trim();

    if (!text) return;

    await addDoc(collection(db, 'posts'), {

      text, uid: currentUser.uid,

      username: userProfile.username,

      handle: userProfile.handle,

      emoji: userProfile.emoji,

      color: userProfile.color,

      time: serverTimestamp()

    });

    document.getElementById('post-text').value = '';

  };

  function loadPosts() {

    const q = query(collection(db, 'posts'), orderBy('time', 'desc'));

    onSnapshot(q, snap => {

      const list = document.getElementById('posts-list');

      list.innerHTML = '';

      snap.forEach(d => {

        const data = d.data();

        list.innerHTML += `

          <div class="post">

            <div class="post-header">

              <div class="avatar" style="background:${data.color};border-color:${data.color};width:40px;height:40px;font-size:20px">${data.emoji}</div>

              <div>

                <div style="font-weight:bold">${data.username}</div>

                <div style="font-size:12px;color:#888">@${data.handle}</div>

              </div>

            </div>

            <div>${data.text}</div>

          </div>`;

      });

    });

  }

  window.showTab = (tab, btn) => {

    document.getElementById('chat-tab').style.display = tab === 'chat' ? 'block' : 'none';

    document.getElementById('posts-tab').style.display = tab === 'posts' ? 'block' : 'none';

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    btn.classList.add('active');

  };

</script>

</body>

</html>
